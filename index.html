<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./style/index.css" />
  <link rel="stylesheet" href="./style/loader.css">
  <title>WaveConnect</title>
</head>

<body>
  <div class="container" id="cardContainer">
    <div id="theCard">

      <div id="formBox1" class="formBox">
        <div class="introText1">Atleast We are not on the Lotus team</div>
        <div class="teamDiv">
          <button class="bn37 pointFinger" id="createTeamBtn">Create Wave</button>
        </div>
        <div class="teamDiv">
          <button id="joinTeamBtn" class="bn37 pointFinger">Join Wave</button>
        </div>
      </div>

      <div id="formBox2" class="formBox login-box">
        <button class="backButton pointFinger">Back</button>
        <h2>Create Wave</h2>

        <form id="create-form">
          <div class="user-box">
            <input type="text" name="userName" required="true" />
            <label>Host's name</label>
          </div>
          <div class="user-box">
            <input type="text" name="meetingName" required="true" />
            <label>Wave</label>
          </div>
          <div class="radio-btns">
            <div>
              <input type="radio" id="systemAudio" name="micSetting" value="systemAudio" checked class="pointFinger">
              <label for="systemAudio" class="pointFinger">System Audio</label>
            </div>
            <div>
              <input type="radio" id="mic" name="micSetting" value="mic" class="pointFinger">
              <label for="mic" class="pointFinger">Mic</label>
            </div>
          </div>
          <a href="#" id="createMeeting" class="pointFinger">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            Submit
          </a>
        </form>
      </div>

      <div class="login-box formBox" id="formBox3">
        <button class="backButton pointFinger" id="">Back</button>
        <h2>Join Wave</h2>
        <form id="join-form">
          <div class="user-box">
            <input type="text" name="userName" required="true" />
            <label>Name</label>
          </div>
          <div class="user-box">
            <input type="text" name="meetingId" required="true" />
            <label>Wave Info</label>
          </div>
          <a herf="#" id='joinMeeting' class="pointFinger">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            Submit
          </a>
        </form>
      </div>

      <div id="logoBox">
        <img src="./images/logo voice (1).png" alt="">
      </div>
    </div>
  </div>

</body>
<script src="./js/index.js"></script>

</html>
